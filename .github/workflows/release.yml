name: Release builds

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload artifacts to
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            os: macos-latest
            script: dist:mac
            artifacts: |
              release/*.dmg
              release/*.dmg.blockmap
              release/*-mac.zip
              release/*-mac.zip.blockmap
              release/latest-mac.yml
          - platform: Windows
            os: windows-latest
            script: dist:win
            artifacts: |
              release/*.exe
              release/*.exe.blockmap
              release/*.zip
              release/*.zip.blockmap
              release/latest.yml

    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build release artifacts
        run: pnpm ${{ matrix.script }}

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: ${{ matrix.artifacts }}
